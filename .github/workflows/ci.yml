name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test (${{ matrix.os }})
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Run tests
        run: cargo test

      - name: Check formatting
        if: matrix.os == 'ubuntu-latest'
        run: cargo fmt -- --check

      - name: Run clippy
        if: matrix.os == 'ubuntu-latest'
        run: cargo clippy -- -W clippy::all

  wasm:
    name: WASM Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: cargo install wasm-pack

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-wasm-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-wasm-

      - name: Build WASM
        run: wasm-pack build --target web --features wasm

      - name: Verify WASM size
        run: |
          size=$(wc -c < pkg/game_compiler_bg.wasm)
          echo "WASM size: ${size} bytes"
          if [ "$size" -lt 100000 ]; then
            echo "ERROR: WASM too small — likely placeholder"
            exit 1
          fi

  vscode:
    name: VS Code Extension
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: editors/vscode
        run: npm install

      - name: Type check
        working-directory: editors/vscode
        run: npx tsc --noEmit

      - name: Build
        working-directory: editors/vscode
        run: npx tsc -p ./

      - name: Package VSIX
        working-directory: editors/vscode
        run: npx vsce package --no-git-tag-version

  examples:
    name: Compile Examples
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Compile all examples
        run: |
          mkdir -p dist
          for f in examples/*.game; do
            echo "Compiling $f..."
            cargo run -- build "$f" -o dist
          done

      - name: Compile gallery components
        run: |
          mkdir -p dist-gallery
          for f in editors/vscode/gallery/components/**/*.game; do
            echo "Compiling $f..."
            cargo run -- build "$f" -o dist-gallery
          done

      - name: Verify all templates compile
        run: |
          mkdir -p dist-templates
          for t in minimal audio particles procedural composition reactive sdf scene; do
            cargo run -- new -t $t -o "dist-templates/${t}.game"
            cargo run -- build "dist-templates/${t}.game" -o dist-templates
          done

      - name: Verify target flag
        run: |
          cargo run -- build examples/001-hello.game -t webgpu -o dist-target
          cargo run -- build examples/001-hello.game -t webgl2 -o dist-target
          cargo run -- build examples/001-hello.game -t both -o dist-target

  lsp:
    name: LSP Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-lsp-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-lsp-

      - name: Build LSP
        run: cargo build --features lsp
